        const STORAGE_KEY = "shtemaran_wrong_answers";

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ И ДАННЫЕ
        // ==========================================
        async function loadInitialData() {
            try {
                populateTopics(); 
                const [manifestRes, answersRes] = await Promise.all([ fetch('./manifest.json'), fetch('./answers_final.json') ]);
                if (!manifestRes.ok || !answersRes.ok) throw new Error("Files not found");
                
                const mData = await manifestRes.json();
                manifestData = mData.tasks || mData; 
                answersData = await answersRes.json();

                const savedErrors = localStorage.getItem(STORAGE_KEY);
                if (savedErrors) try { wrongAnswers = JSON.parse(savedErrors); } catch(e){}

                document.getElementById('init-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.replace('hidden', 'flex');
            } catch (err) {
                document.getElementById('init-screen').innerHTML = `<div class="text-red-500 font-bold text-xl p-6 glass rounded-xl"><i class="fa-solid fa-triangle-exclamation"></i> Սխալ: Չհաջողվեց բեռնել JSON ֆայլերը:</div>`;
                console.error(err);
            }
        }

        function populateTopics() {
            const select = document.getElementById('topic-select');
            select.innerHTML = "";
            FILES_CONFIG[activeFile].topics.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id; opt.innerText = t.name; select.appendChild(opt);
            });
        }

        function getActiveTopicBounds() {
            const topicId = parseInt(document.getElementById('topic-select').value, 10);
            const topic = FILES_CONFIG[activeFile].topics.find(t => t.id === topicId);
            return { min: topic.min, max: topic.max };
        }   

        function fetchAnswerData(fileKey, n) {
            const jsonKey = FILES_CONFIG[fileKey].jsonKey;
            if (answersData[jsonKey] && answersData[jsonKey][n.toString()]) return answersData[jsonKey][n.toString()].join("  /  ");
            return "?";
        }

        // ==========================================
        // РЕНДЕРИНГ PDF
        // ==========================================
        async function fetchTaskImage(fileKey, n) {
            const fetchUrl = FILES_CONFIG[fileKey].fetchUrl;
            const matchName = FILES_CONFIG[fileKey].matchName;
            const taskInfo = manifestData.find(t => parseInt(t.id, 10) === parseInt(n, 10) && (t.file || "").includes(matchName));
            if (!taskInfo) return false; 

            try {
                if (!loadedPdfDocs[fileKey]) loadedPdfDocs[fileKey] = await pdfjsLib.getDocument(fetchUrl).promise;
                const doc = loadedPdfDocs[fileKey];
                const page = await doc.getPage(taskInfo.page + 1);

                const scale = 2.5; 
                const viewport = page.getViewport({ scale });

                const offscreenCanvas = document.createElement('canvas');
                offscreenCanvas.width = viewport.width; offscreenCanvas.height = viewport.height;
                const offCtx = offscreenCanvas.getContext('2d');
                await page.render({ canvasContext: offCtx, viewport }).promise;

                const [x0, y0, x1, y1] = taskInfo.rect;
                const sx0 = x0 * scale, sy0 = y0 * scale, sWidth = (x1 - x0) * scale, sHeight = (y1 - y0) * scale;

                const visibleCanvas = document.getElementById('pdf-canvas');
                visibleCanvas.width = sWidth; visibleCanvas.height = sHeight;
                const vCtx = visibleCanvas.getContext('2d');

                vCtx.clearRect(0, 0, sWidth, sHeight);
                vCtx.fillStyle = "#ffffff"; vCtx.fillRect(0, 0, sWidth, sHeight);
                vCtx.drawImage(offscreenCanvas, sx0, sy0, sWidth, sHeight, 0, 0, sWidth, sHeight);
                
                return true;
            } catch (err) { console.error("PDF Render Error:", err); return false; }
        }

        // ==========================================

        // ==========================================

            currentMode = mode;
            activeFile = (mode === "FILE 1" || mode === "FILE 2") ? mode : "FILE 1";
            populateTopics();
            document.getElementById('start-screen').classList.replace('flex', 'hidden');
            document.getElementById('main-app').classList.replace('hidden', 'flex');
            loadRandomTask();
        }

            document.getElementById('main-app').classList.replace('flex', 'hidden');
            document.getElementById('start-screen').classList.replace('hidden', 'flex');
            currentMode = null;
        }

        function isChoiceTask(fileKey, n) {
            return FILES_CONFIG[fileKey].ranges.some(r => n >= r[0] && n <= r[1]);
        }

        async function loadTask(n, fileToUse = null) {
            document.getElementById('feedback-msg').classList.add('hidden');
            resetAIContext();

            let prevFile = activeFile;
            activeFile = fileToUse || ((currentMode === "COMBINED") ? "FILE 1" : currentMode);
            if (prevFile !== activeFile) populateTopics();

            const canvas = document.getElementById('pdf-canvas');
            const loading = document.getElementById('loading-text');
            canvas.classList.add('hidden'); loading.classList.remove('hidden');
            document.getElementById('btn-container').innerHTML = '';

            currentTask = parseInt(n, 10);
            document.getElementById('task-entry').value = currentTask;
            document.getElementById('info-label').innerText = activeFile === "FILE 1" ? "Շտեմ. 1" : "Շտեմ. 2";

            const success = await fetchTaskImage(activeFile, currentTask);
            
            if (success) {
                loading.classList.add('hidden'); canvas.classList.remove('hidden');
                updateButtons(currentTask);
            } else {
                loading.innerHTML = `<i class="fa-solid fa-circle-exclamation text-red-500 text-4xl"></i><span>Սխալ՝ №${currentTask} չգտնվեց</span>`;
            }
        }

        function loadTaskFromInput(forcedId = null) {
            const rawVal = document.getElementById('task-entry').value;
            if (!rawVal && forcedId === null) return; 
            const val = forcedId !== null ? forcedId : parseInt(rawVal, 10);
            if (!val || isNaN(val)) return;

            let targetFile = activeFile;
            let existsInCurrent = manifestData.some(t => parseInt(t.id, 10) === val && (t.file || "").includes(FILES_CONFIG[activeFile].matchName));

            if (!existsInCurrent) {
                let otherFile = activeFile === "FILE 1" ? "FILE 2" : "FILE 1";
                if(manifestData.some(t => parseInt(t.id, 10) === val && (t.file || "").includes(FILES_CONFIG[otherFile].matchName))) {
                    targetFile = otherFile; existsInCurrent = true;
                }
            }
            if (existsInCurrent) loadTask(val, targetFile);
            else showFeedback(`№${val} առաջադրանքը չգտնվեց:`, 'error');
        }

        function navigateTask(dir) {
            if (document.getElementById('check-random-nav').checked && dir === 1) loadRandomTask();
            else if (currentTask !== null) loadTaskFromInput(currentTask + dir);
        }

        function loadRandomTask() {
            const onlyTest = document.getElementById('check-only-test').checked;
            const onlyErrors = document.getElementById('check-only-errors').checked;
            const bounds = getActiveTopicBounds();

            let validTasks = manifestData.filter(t => {
                let fStr = t.file || "";
                let fKey = fStr.includes(FILES_CONFIG["FILE 1"].matchName) ? "FILE 1" : fStr.includes(FILES_CONFIG["FILE 2"].matchName) ? "FILE 2" : null;
                if (!fKey || (currentMode !== "COMBINED" && currentMode !== fKey)) return false;
                let tId = parseInt(t.id, 10);
                if (onlyTest && !isChoiceTask(fKey, tId)) return false;
                if (tId < bounds.min || tId > bounds.max) return false;
                return true;
            });

            if (onlyErrors) {
                if (wrongAnswers.length === 0) {
                    alert("Սխալներ չկան:"); document.getElementById('check-only-errors').checked = false;
                } else {
                    validTasks = validTasks.filter(t => wrongAnswers.some(w => w.file === (t.file.includes("shtem1") ? "FILE 1":"FILE 2") && w.task === parseInt(t.id, 10)));
                }
            }

            if (validTasks.length === 0) { showFeedback("Չգտնվեց:", 'error'); return; }
            const rTask = validTasks[Math.floor(Math.random() * validTasks.length)];
            loadTask(rTask.id, rTask.file.includes("shtem1") ? "FILE 1" : "FILE 2");
        }

        // ==========================================
        // ИНТЕРФЕЙС И КНОПКИ ОТВЕТОВ
        // ==========================================
       // ==========================================
        // ИНТЕРФЕЙС И КНОПКИ ОТВЕТОВ
        // ==========================================
        function updateButtons(n) {
            const container = document.getElementById('btn-container');
            container.innerHTML = ''; 
            // Добавляем нижний отступ, чтобы приподнять блок на телефонах
            container.classList.add('pb-10', 'sm:pb-4');

            const isChoice = isChoiceTask(activeFile, n);

            if (isChoice) {
                for (let i = 1; i <= 4; i++) {
                    const b = document.createElement('button');
                    // Добавлены классы w-14 h-14 для мобильных и sm:w-16 sm:h-16 для ПК + mb-2
                    b.className = 'choice-btn w-14 h-14 sm:w-16 sm:h-16 rounded-2xl bg-white/60 dark:bg-slate-800/60 border-2 border-slate-300 dark:border-slate-600 font-bold text-xl sm:text-2xl shadow-sm hover:border-primary hover:text-primary transition-all mb-2';
                    b.innerText = i; b.onclick = () => processChoice(i, b);
                    container.appendChild(b);
                }
            } else {
                const b = document.createElement('button');
                b.className = 'px-8 py-4 mb-2 rounded-xl bg-accent hover:bg-amber-600 text-white font-bold text-lg shadow-lg transition-transform hover:scale-105';
                b.innerText = "Ցույց տալ պատասխանը"; b.onclick = showFullAnswer;
                container.appendChild(b);
            }
        }

        function processChoice(val, clickedBtn) {
            const correctAns = fetchAnswerData(activeFile, currentTask).split(" / ")[0].trim(); 
            const isCorrect = val.toString() === correctAns.toString();
            
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctAns) {
                    btn.classList.add('bg-green-500', 'border-green-500', 'text-white');
                    btn.classList.remove('bg-white/60', 'dark:bg-slate-800/60', 'border-slate-300');
                } else if (btn === clickedBtn && !isCorrect) {
                    btn.classList.add('bg-red-500', 'border-red-500', 'text-white');
                    btn.classList.remove('bg-white/60', 'dark:bg-slate-800/60', 'border-slate-300');
                }
            });

            if (isCorrect) {
                sessionCorrect++; document.getElementById('stat-correct').innerText = sessionCorrect;
                showFeedback("✅ Ճիշտ է:", 'success');
                wrongAnswers = wrongAnswers.filter(w => !(w.file === activeFile && w.task === currentTask));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(wrongAnswers));
                setTimeout(() => navigateTask(1), 1000);
            } else {
                sessionWrong++; document.getElementById('stat-wrong').innerText = sessionWrong;
                showFeedback(`❌ Սխալ է: Ճիշտը՝ ${correctAns}`, 'error');
                saveWrongAnswer(activeFile, currentTask);
            }
        }

        function showFullAnswer() {
            const ans = fetchAnswerData(activeFile, currentTask);
            const container = document.getElementById('btn-container');
            container.innerHTML = '';
            showFeedback(`Պատասխան: ${ans}`, 'info');

            container.innerHTML = `
                <button onclick="addToWrong()" class="px-6 py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold shadow-md transition-transform hover:scale-105"><i class="fa-solid fa-plus"></i> Սխալներում</button>
                <button onclick="navigateTask(1)" class="px-6 py-3 rounded-xl bg-primary hover:bg-indigo-700 text-white font-bold shadow-md transition-transform hover:scale-105">Հաջորդը <i class="fa-solid fa-arrow-right"></i></button>
            `;
        }

        function showFeedback(text, type) {
            const fb = document.getElementById('feedback-msg');
            fb.innerText = text; fb.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'bg-blue-100', 'text-green-800', 'text-red-800', 'text-blue-800');
            if(type==='success') fb.classList.add('bg-green-100', 'text-green-800', 'dark:bg-green-900', 'dark:text-green-100');
            if(type==='error') fb.classList.add('bg-red-100', 'text-red-800', 'dark:bg-red-900', 'dark:text-red-100');
            if(type==='info') fb.classList.add('bg-blue-100', 'text-blue-800', 'dark:bg-blue-900', 'dark:text-blue-100');
        }

        // ==========================================
        // ИНТЕГРАЦИЯ ИИ (Gemini 3 Flash Preview) + MathJax + Внедрение правильного ответа
        // ==========================================
        function toggleAISidebar() {
            const sidebar = document.getElementById('ai-sidebar');
            sidebar.classList.toggle('open');
        }

        function resetAIContext() {
            const content = document.getElementById('ai-content');
            content.innerHTML = `
                <div class="text-center text-slate-500 dark:text-slate-400 mt-10">
                    <i class="fa-solid fa-robot text-4xl mb-3 opacity-50"></i>
                    <p>Սեղմեք "Բացատրել խնդիրը" կոճակին՝ քայլ առ քայլ լուծում ստանալու համար:</p>
                </div>`;
            document.getElementById('ai-ask-btn').disabled = false;
            document.getElementById('ai-ask-btn').innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Բացատրել խնդիրը`;
        }

        async function askAITutor() {
            if (!apiKey || apiKey.trim() === "") {
                alert("API Key-ը բացակայում է կոդում (Вставьте ваш API ключ в код).");
                return;
            }

            const canvas = document.getElementById('pdf-canvas');
            if (canvas.classList.contains('hidden')) return;

            const btn = document.getElementById('ai-ask-btn');
            const content = document.getElementById('ai-content');
            
            document.getElementById('ai-sidebar').classList.add('open');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Մտածում է...`;
            content.innerHTML = `<div class="flex flex-col items-center justify-center mt-10 gap-4 text-purple-500">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl"></i>
                <span class="font-semibold text-sm animate-pulse">Ուղարկվում է Google Gemini 3...</span>
            </div>`;

            try {
                const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                
                // ВАЖНО: Достаем правильный ответ из базы, чтобы дать его ИИ как подсказку
                const correctAnswer = fetchAnswerData(activeFile, currentTask);

                // Новый промпт, заставляющий ИИ решать под правильный ответ
                const prompt = `Դուք ֆիզիկայի պրոֆեսիոնալ ուսուցիչ եք։ Լուծեք նկարում պատկերված ֆիզիկայի խնդիրը կամ թեստը։
ՈՒՇԱԴՐՈՒԹՅՈՒՆ: Այս խնդրի ճիշտ վերջնական պատասխանն է (կամ պատասխաններն են)՝ **${correctAnswer}**:
Խնդրում եմ բացատրեք քայլ առ քայլ, տրամաբանորեն և հասկանալի լեզվով, թե ինչպես ստանալ ճիշտ այս պատասխանը։
Պատասխանը գրեք միայն հայերենով (Armenian language only)։ Օգտագործեք Markdown ձևաչափում (թավատառեր, բանաձևերի առանձնացում)։`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                };

                const cleanApiKey = apiKey.trim();
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${cleanApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let errorMessage = `HTTP ${response.status}`;
                    try {
                        const errorData = await response.json();
                        if (errorData.error && errorData.error.message) {
                            errorMessage = errorData.error.message;
                        }
                    } catch(e) {}
                    
                    if (response.status === 503) {
                        throw new Error("Google-ի սերվերները ծանրաբեռնված են (503): Խնդրում ենք փորձել 1 րոպեից:");
                    }
                    throw new Error(`Google API: ${errorMessage}`);
                }
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts.length > 0) {
                    const textResponse = data.candidates[0].content.parts[0].text;
                    
                    // Сначала парсим Markdown
                    content.innerHTML = marked.parse(textResponse);
                    
                    // Затем запускаем MathJax, чтобы он отрисовал все формулы LaTeX ($...$)
                    if (window.MathJax) {
                        window.MathJax.typesetPromise([content]).catch((err) => console.error('MathJax error: ', err));
                    }

                } else {
                    throw new Error("Անհասկանալի պատասխան սերվերից:");
                }
                
            } catch (error) {
                console.error("Gemini API Error:", error);
                content.innerHTML = `<div class="text-red-600 p-4 bg-red-50 dark:bg-red-900/30 rounded-lg border border-red-200 dark:border-red-800">
                    <p class="font-bold mb-2"><i class="fa-solid fa-bug"></i> Սխալ առաջացավ</p>
                    <p class="text-sm font-mono">${error.message}</p>
                </div>`;
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-rotate-right"></i> Նորից հարցնել`;
                btn.disabled = false;
            }
        }

        // ==========================================
        // УТИЛИТЫ И МОДАЛЬНЫЕ ОКНА
        // ==========================================
        function saveWrongAnswer(f, t) {
            if (!wrongAnswers.some(w => w.file === f && w.task === t)) {
                wrongAnswers.push({ file: f, task: t });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(wrongAnswers));
            }
        }
        function addToWrong() { saveWrongAnswer(activeFile, currentTask); showFeedback("✅ Ավելացվեց", 'success'); }

        function showWrongList() {
            if (wrongAnswers.length === 0) return alert("Սխալներ չկան");
            const list = document.getElementById('errors-list'); list.innerHTML = '';
            wrongAnswers.sort((a,b)=>a.file===b.file ? a.task-b.task : a.file.localeCompare(b.file)).forEach(i => {
                const b = document.createElement('button');
                b.className = 'w-full text-left p-3 rounded-lg bg-white/50 dark:bg-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-600 font-medium transition-colors';
                b.innerHTML = `<span class="text-xs text-slate-500 block mb-1">${i.file==="FILE 1"?"Շտեմ 1":"Շտեմ 2"}</span> Խնդիր №${i.task}`;
                b.onclick = () => { 
                    document.getElementById('start-screen').classList.replace('flex', 'hidden');
                    document.getElementById('main-app').classList.replace('hidden', 'flex');
                    if (!currentMode) currentMode = "COMBINED";
                    loadTask(i.task, i.file); closeModal(); 
                };
                list.appendChild(b);
            });
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        }

        function clearErrors() { 
            wrongAnswers = []; localStorage.removeItem(STORAGE_KEY); closeModal(); 
            document.getElementById('check-only-errors').checked = false; alert("Մաքրված է"); 
        }
        function closeModal() { document.getElementById('modal-overlay').classList.replace('flex', 'hidden'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function toggleMistakeMode() {
            if (document.getElementById('check-only-errors').checked && wrongAnswers.length === 0) {
                alert("Սխալների ցանկը դատարկ է:"); document.getElementById('check-only-errors').checked = false;
            }
        }
        function downloadCurrentPDF() {
            if(!activeFile) return;
            const a = document.createElement('a'); a.href = FILES_CONFIG[activeFile].fetchUrl;
            a.target = '_blank'; a.download = activeFile + ".pdf"; a.click();
        }
        function handleEnter(e) { if(e.key === 'Enter') loadTaskFromInput(); }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal-overlay').classList.contains('flex')) return;
            if (document.activeElement.tagName === 'INPUT' && e.key !== 'Enter') return;
            if (e.key >= '1' && e.key <= '4') {
                const btns = document.querySelectorAll('.choice-btn');
                const target = Array.from(btns).find(b => b.innerText === e.key);
                if (target && !target.disabled) target.click();
            } else if (e.key.toLowerCase() === 'r' || e.key === 'կ') { if(!document.getElementById('main-app').classList.contains('hidden')) loadRandomTask();
            } else if (e.key === 'ArrowRight') { if(!document.getElementById('main-app').classList.contains('hidden')) navigateTask(1);
            } else if (e.key === 'ArrowLeft') { if(!document.getElementById('main-app').classList.contains('hidden')) navigateTask(-1);
            }
        });

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ И ДАННЫЕ
        // ==========================================
        
        
        

        window.onload = loadInitialData;

    </script>
</body>
